<!DOCTYPE html>
<html>
<head>
    <title>Hangman Game</title>
    <script>
(function () {
    var path = window.location.pathname || '/';
    window.APP_BASE_PATH = path.indexOf('/hangman') === 0 ? '/hangman' : '';
})();
</script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>Hangman</h1>

    <div id="auth-bar" class="auth-bar">
        <div id="auth-guest" class="auth-guest">
            <button type="button" id="show-signup-btn" class="tab-btn">Sign up</button>
            <button type="button" id="show-login-btn" class="tab-btn">Log in</button>
        </div>
        <div id="auth-user" class="auth-user hidden">
            <span id="auth-username"></span>
            <button type="button" id="logout-btn" class="tab-btn">Log out</button>
        </div>
    </div>
    <div id="auth-forms" class="auth-forms hidden">
        <div id="signup-form" class="auth-form card hidden">
            <h3>Sign up</h3>
            <input type="text" id="signup-username" placeholder="Username" minlength="3" required>
            <input type="password" id="signup-password" placeholder="Password (min 6)" minlength="6" required>
            <button type="button" id="signup-submit-btn">Sign up</button>
            <p id="signup-message" class="auth-message"></p>
        </div>
        <div id="login-form" class="auth-form card hidden">
            <h3>Log in</h3>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button type="button" id="login-submit-btn">Log in</button>
            <p id="login-message" class="auth-message"></p>
        </div>
    </div>

    <div class="top-nav">
        <button id="show-game-btn" class="tab-btn active">Play</button>
        <button id="show-progress-btn" class="tab-btn">Progress</button>
    </div>

    <section id="game-view">
        <div id="theme-hint" class="theme-hint" aria-live="polite"></div>
        <canvas id="hangman-canvas" width="200" height="250"></canvas>
        <div id="word"></div>
        <div id="wrong-letters"></div>
        <div id="message"></div>
        <button id="restart-btn" style="display:none;">Play Again</button>
        <div id="leaderboard" class="leaderboard-card"></div>
    </section>

    <section id="progress-view" class="hidden">
        <h2>My Progress 🌟</h2>
        <div id="progress-summary" class="card"></div>
        <div id="theme-progress" class="card"></div>
        <h3>Leaderboard</h3>
        <div id="leaderboard-self-summary" class="card leaderboard-self-summary hidden"></div>
        <div class="leaderboard-period-tabs">
            <button type="button" id="lb-tab-today" class="tab-btn lb-period-btn">Today</button>
            <button type="button" id="lb-tab-week" class="tab-btn lb-period-btn active">This Week</button>
            <button type="button" id="lb-tab-all" class="tab-btn lb-period-btn">All Time</button>
        </div>
        <div id="progress-leaderboard" class="card"></div>
        <button id="share-progress-btn">Share Progress Card</button>
        <div id="share-preview" class="hidden">
            <h3>Share Card Preview</h3>
            <img id="share-image" alt="progress share card">
        </div>
        <canvas id="share-canvas" width="600" height="320" class="hidden"></canvas>
    </section>

    <audio id="correct-sound" src="./assets/correct.mp3"></audio>
    <audio id="wrong-sound" src="./assets/wrong.mp3"></audio>
    <audio id="win-sound" src="./assets/win.mp3"></audio>
    <audio id="lose-sound" src="./assets/lose.mp3"></audio>
    <script src="./game.js"></script>
</body>
</html>
